# Model configuration
# These are the models used by each stage of the pipeline.
# To change a model, edit here and restart the application.

ollama:
  base_url: http://localhost:11434

# Stage 1 — C code → Low-Level Requirements (LLR)
# Needs strong instruction-following and code comprehension.
#
# IMPORTANT — Qwen3 determinism:
# qwen3-coder:30b (and all qwen3-* models) are hybrid thinking/non-thinking
# models. Their internal chain-of-thought reasoning pass is non-deterministic
# and is NOT suppressed by temperature=0 or seed=42 alone. This causes
# Stage 1 to produce different requirements on each run for the same input.
#
# The fix is applied in api/app.py: think=False is sent as a TOP-LEVEL
# parameter in the Ollama API request (not inside "options", where it would
# be silently ignored). This disables the thinking pass entirely.
stage1:
  model: qwen3-coder:30b

# Stage 2 — LLR → Jama-compliant Low-Level Requirements
# Needs strong formal writing and reliable JSON output.
# qwen2.5 has no thinking mode — fully deterministic with temperature=0.
stage2:
  model: qwen2.5:latest