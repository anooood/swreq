# Model configuration
# These are the hardcoded models used by each stage of the pipeline.
# To change a model, edit here and restart the application.

ollama:
  base_url: http://localhost:11434

# Stage 1 — C code → Low-Level Requirements (LLR)
# Needs strong instruction-following and code comprehension.
stage1:
  model: qwen3-coder:30b 

# Stage 2 — LLR → Jama-compliant High-Level Requirements (HLR)
# Needs strong formal writing and JSON output reliability.
stage2:
  model: qwen2.5:latest