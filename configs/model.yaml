# Model configuration
# These are the models used by each stage of the pipeline.
# To change a model, edit here and restart the application.

ollama:
  base_url: http://localhost:11434
  #base_url: http://ollama:11434

# Stage 1 — C code → Low-Level Requirements (LLR)
# Needs strong instruction-following and code comprehension.
#
# NOTE on consistency across runs:
# qwen3-coder:30b is a NON-THINKING-ONLY MoE model — it does NOT emit
# <think>...</think> blocks, and `think=False` is a no-op on it (any older
# comments claiming otherwise were based on a confusion with the hybrid
# `qwen3:*` models, which ARE thinking/non-thinking hybrids).
#
# The actual source of Stage 1 inconsistency is KV-cache / slot state in
# the Ollama server: a freshly-started server produces the best results,
# and quality degrades on subsequent runs against the same server process
# because cached prompt prefixes from prior requests contaminate attention
# state for later requests.
#
# The fix is applied in api/app.py:
#   1. Stage 1 uses a short keep_alive (not -1), so slots are recycled.
#   2. num_keep=0 is set in Stage 1 options to prevent token retention
#      across requests.
#   3. A POST /reset_stage1 endpoint unloads and reloads the Stage 1 model
#      on demand; the Streamlit UI calls it before each "Generate LLRs"
#      batch so every run starts from a pristine cache state.
stage1:
  model: qwen3-coder:30b

# Stage 2 — LLR → Jama-compliant Low-Level Requirements
# Needs strong formal writing and reliable JSON output.
# qwen2.5 has no thinking mode — fully deterministic with temperature=0.
stage2:
  model: qwen2.5:latest